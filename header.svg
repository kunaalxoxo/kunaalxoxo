<svg width="900" height="200" viewBox="0 0 900 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="900" height="200" fill="#0d1117"/>

  <!-- subtle grid lines -->
  <line x1="0" y1="40" x2="900" y2="40" stroke="#161b22" stroke-width="1"/>
  <line x1="0" y1="80" x2="900" y2="80" stroke="#161b22" stroke-width="1"/>
  <line x1="0" y1="120" x2="900" y2="120" stroke="#161b22" stroke-width="1"/>
  <line x1="0" y1="160" x2="900" y2="160" stroke="#161b22" stroke-width="1"/>
  <line x1="180" y1="0" x2="180" y2="200" stroke="#161b22" stroke-width="1"/>
  <line x1="360" y1="0" x2="360" y2="200" stroke="#161b22" stroke-width="1"/>
  <line x1="540" y1="0" x2="540" y2="200" stroke="#161b22" stroke-width="1"/>
  <line x1="720" y1="0" x2="720" y2="200" stroke="#161b22" stroke-width="1"/>

  <!-- accent bar left -->
  <rect x="52" y="52" width="3" height="96" fill="#e94560" rx="1"/>

  <!-- main name -->
  <text x="72" y="105" font-family="'Courier New', monospace" font-size="64" font-weight="700" fill="#e6edf3" letter-spacing="-2">kunaal</text>

  <!-- blinking cursor -->
  <rect x="430" y="58" width="4" height="52" fill="#e94560" rx="1">
    <animate attributeName="opacity" values="1;0;1" dur="1.1s" repeatCount="indefinite"/>
  </rect>

  <!-- subtitle -->
  <text x="72" y="138" font-family="'Courier New', monospace" font-size="13" fill="#8b949e" letter-spacing="1">builder  ·  bits pilani hyderabad  ·  gsoc 2026</text>

  <!-- top-right tag -->
  <text x="848" y="28" font-family="'Courier New', monospace" font-size="11" fill="#30363d" text-anchor="end">v0.19.0</text>

  <!-- bottom-right decorative dots -->
  <circle cx="820" cy="160" r="3" fill="#e94560" opacity="0.5"/>
  <circle cx="834" cy="160" r="3" fill="#e94560" opacity="0.3"/>
  <circle cx="848" cy="160" r="3" fill="#e94560" opacity="0.15"/>
</svg>
